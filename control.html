<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Patient Controls | Hospital Monitor</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body data-page="control">
  <div class="page control-page">
    <div class="card">
      <div class="card-header">
        <div>
          <h1 class="title">Patient Controls</h1>
          <p class="subtitle">Instructor display</p>
        </div>
        <div class="page-actions">
          <span id="syncStatus" class="status-pill warning">Waiting for monitor</span>
          <button id="btnStart" class="active">Pause</button>
          <button id="btnReset">Reset</button>
          <button id="btnOpenMonitor">Open monitor</button>
        </div>
      </div>

      <div class="side">
        <div class="toggle-row">
          <div class="toggle">
            <span>Grid</span>
            <input id="showGrid" type="checkbox" checked />
          </div>
          <div class="toggle">
            <span>Diagnostic</span>
            <input id="showDiagnostic" type="checkbox" checked />
          </div>
        </div>

        <div class="toggle-row">
          <div class="toggle">
            <span>Alarms</span>
            <input id="alarmsEnabled" type="checkbox" checked />
          </div>
          <div class="toggle">
            <span>Sound</span>
            <input id="soundEnabled" type="checkbox" checked />
          </div>
        </div>

        <div class="control advisory-panel">
          <div class="control-top">
            <label>Technical alarms</label>
            <div class="value-box">
              <span class="unit advisory-label">Advisory</span>
            </div>
          </div>
          <div class="toggle-list">
            <label class="toggle mini-toggle">
              <span>ECG leads off</span>
              <input id="ecgLeadsOff" type="checkbox" />
            </label>
            <label class="toggle mini-toggle">
              <span>SpO2 sensor off</span>
              <input id="spo2ProbeOff" type="checkbox" />
            </label>
            <label class="toggle mini-toggle">
              <span>TEMP probe off</span>
              <input id="tempProbeOff" type="checkbox" />
            </label>
          </div>
        </div>

        <div class="control">
          <div class="control-top">
            <label for="alarmVolume">Alarm volume</label>
            <div class="value-box">
              <input id="alarmVolumeNumber" type="number" min="0" max="100" step="1" value="50" />
              <span class="unit">%</span>
            </div>
          </div>
          <input id="alarmVolume" type="range" min="0" max="100" step="1" value="50" />
        </div>

        <div class="control">
          <div class="control-top">
            <label for="channel2Type">Channel 2</label>
            <div class="value-box">
              <select id="channel2Type">
                <option value="cvp">CVP</option>
                <option value="art2">ART2</option>
                <option value="pap">PAP</option>
                <option value="icp">ICP</option>
                <option value="off">Disconnected</option>
              </select>
            </div>
          </div>
        </div>

        <div class="control">
          <div class="control-top">
            <label for="stProfile">ST profile</label>
            <div class="value-box">
              <select id="stProfile">
                <option value="normal">Normal</option>
                <option value="nonspecific">Nonspecific changes</option>
                <option value="depression">ST depression</option>
                <option value="inferiorElevation">Inferior STE</option>
                <option value="anteriorElevation">Anterior STE</option>
              </select>
            </div>
          </div>
        </div>

        <div class="control">
          <div class="control-top">
            <label for="patientName">Patient name</label>
            <div class="value-box">
              <input id="patientName" type="text" maxlength="24" placeholder="No name" value="" />
            </div>
          </div>
        </div>

        <div class="control">
          <div class="control-top">
            <label for="ecgGain">ECG gain</label>
            <div class="value-box">
              <select id="ecgGain">
                <option value="0.5">x0.5</option>
                <option value="1">x1</option>
                <option value="2">x2</option>
              </select>
            </div>
          </div>
        </div>

        <div class="control">
          <div class="control-top">
            <label for="ecgSweepSpeed">ECG sweep speed</label>
            <div class="value-box">
              <select id="ecgSweepSpeed">
                <option value="12.5">12.5 mm/s</option>
                <option value="25">25 mm/s</option>
                <option value="50">50 mm/s</option>
              </select>
            </div>
          </div>
        </div>

        <div class="quick">
          <button data-profile="normal">Normal profile</button>
          <button data-profile="tachy">Tachycardia</button>
          <button data-profile="brady">Bradycardia</button>
          <button data-profile="hypoxia">Hypoxia</button>
          <button data-profile="shock">Shock</button>
          <button data-profile="sedation">Sedation</button>
        </div>

        <div id="controls"></div>

        <div id="alarmBanner" class="note danger" style="display:none;">
          <strong>Active alarm:</strong> <span id="alarmText">No alarms</span>
        </div>

        <div class="metric-grid">
          <div class="metric">
            <div class="name green">HR</div>
            <div class="num green" id="mHr">80</div>
          </div>
          <div class="metric">
            <div class="name cyan">SpO2</div>
            <div class="num cyan" id="mSpO2">99</div>
          </div>
          <div class="metric">
            <div class="name yellow">RESP</div>
            <div class="num yellow small" id="mResp">14</div>
          </div>
          <div class="metric">
            <div class="name orange">BP</div>
            <div class="num orange small" id="mBP">120/80</div>
          </div>
        </div>

        <div class="note">
          Channel 2 can emulate CVP, ART2, PAP, ICP, or stay disconnected. Changes are sent to the student monitor in real time.
        </div>
      </div>
    </div>
  </div>

  <script src="js/state.js"></script>
  <script src="js/waves.js"></script>
  <script src="js/alarms.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/renderer.js"></script>
  <script src="js/controls.js"></script>
  <script src="js/sync.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
