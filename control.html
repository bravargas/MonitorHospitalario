<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Control de paciente | Monitor hospitalario</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body data-page="control">
  <div class="page control-page">
    <div class="card">
      <div class="card-header">
        <div>
          <h1 class="title">Controles del paciente</h1>
          <p class="subtitle">Pantalla del profesor</p>
        </div>
        <div class="page-actions">
          <span id="syncStatus" class="status-pill warning">Esperando monitor</span>
          <button id="btnStart" class="active">Pausar</button>
          <button id="btnReset">Reset</button>
          <button id="btnOpenMonitor">Abrir monitor</button>
        </div>
      </div>

      <div class="side">
        <div class="toggle-row">
          <div class="toggle">
            <span>Grid</span>
            <input id="showGrid" type="checkbox" checked />
          </div>
          <div class="toggle">
            <span>Diagnóstico</span>
            <input id="showDiagnostic" type="checkbox" checked />
          </div>
        </div>

        <div class="toggle-row">
          <div class="toggle">
            <span>Alarmas</span>
            <input id="alarmsEnabled" type="checkbox" checked />
          </div>
          <div class="toggle">
            <span>Sonido</span>
            <input id="soundEnabled" type="checkbox" checked />
          </div>
        </div>

        <div class="control advisory-panel">
          <div class="control-top">
            <label>Alarmas técnicas</label>
            <div class="value-box">
              <span class="unit advisory-label">Advisory</span>
            </div>
          </div>
          <div class="toggle-list">
            <label class="toggle mini-toggle">
              <span>ECG leads off</span>
              <input id="ecgLeadsOff" type="checkbox" />
            </label>
            <label class="toggle mini-toggle">
              <span>Sensor SpO2 off</span>
              <input id="spo2ProbeOff" type="checkbox" />
            </label>
            <label class="toggle mini-toggle">
              <span>Sonda TEMP off</span>
              <input id="tempProbeOff" type="checkbox" />
            </label>
          </div>
        </div>

        <div class="control">
          <div class="control-top">
            <label for="alarmVolume">Volumen de alarma</label>
            <div class="value-box">
              <input id="alarmVolumeNumber" type="number" min="0" max="100" step="1" value="50" />
              <span class="unit">%</span>
            </div>
          </div>
          <input id="alarmVolume" type="range" min="0" max="100" step="1" value="50" />
        </div>

        <div class="control">
          <div class="control-top">
            <label for="channel2Type">Canal 2</label>
            <div class="value-box">
              <select id="channel2Type">
                <option value="cvp">CVP</option>
                <option value="art2">ART2</option>
                <option value="pap">PAP</option>
                <option value="icp">ICP</option>
                <option value="off">Desconectado</option>
              </select>
            </div>
          </div>
        </div>

        <div class="quick">
          <button data-profile="normal">Perfil normal</button>
          <button data-profile="tachy">Taquicardia</button>
          <button data-profile="brady">Bradicardia</button>
          <button data-profile="hypoxia">Hipoxia</button>
          <button data-profile="shock">Shock</button>
          <button data-profile="sedation">Sedación</button>
        </div>

        <div id="controls"></div>

        <div id="alarmBanner" class="note danger" style="display:none;">
          <strong>Alarma activa:</strong> <span id="alarmText">Sin alarmas</span>
        </div>

        <div class="metric-grid">
          <div class="metric">
            <div class="name green">HR</div>
            <div class="num green" id="mHr">80</div>
          </div>
          <div class="metric">
            <div class="name cyan">SpO2</div>
            <div class="num cyan" id="mSpO2">99</div>
          </div>
          <div class="metric">
            <div class="name yellow">RESP</div>
            <div class="num yellow small" id="mResp">14</div>
          </div>
          <div class="metric">
            <div class="name orange">PA</div>
            <div class="num orange small" id="mBP">120/80</div>
          </div>
        </div>

        <div class="note">
          El canal 2 puede emular CVP, ART2, PAP, ICP o quedar desconectado. Los cambios se envían al monitor del estudiante en tiempo real.
        </div>
      </div>
    </div>
  </div>

  <script src="js/state.js"></script>
  <script src="js/waves.js"></script>
  <script src="js/alarms.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/renderer.js"></script>
  <script src="js/controls.js"></script>
  <script src="js/sync.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
