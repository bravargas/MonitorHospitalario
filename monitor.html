<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BrainMed Hospital Monitor</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body data-page="monitor">
  <div class="page monitor-page">
    <div class="card">
      <div class="card-header">
        <div>
          <h1 class="title">BrainMed Vital Signs Monitor</h1>
          <p class="subtitle">Student display</p>
        </div>
      </div>

      <div class="monitor-wrap">
        <canvas id="monitor" width="1100" height="620"></canvas>
      </div>

      <div class="status-row">
        <span id="syncStatus" class="status-pill warning">Waiting for control</span>
      </div>

      <p class="monitor-hint">Double-click the monitor to enter or exit full screen.</p>
    </div>
  </div>

  <script src="js/state.js"></script>
  <script src="js/waves.js"></script>
  <script src="js/alarms.js"></script>
  <script src="js/audio-asset.js"></script>
  <script src="js/nibp-audio-asset.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/renderer.js"></script>
  <script src="js/controls.js"></script>
  <script src="js/sync.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
