<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Monitor hospitalario</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body data-page="monitor">
  <div class="page monitor-page">
    <div class="card">
      <div class="card-header">
        <div>
          <h1 class="title">Monitor de signos vitales</h1>
          <p class="subtitle">Pantalla del estudiante</p>
        </div>
        <div class="status-row">
          <span id="syncStatus" class="status-pill warning">Esperando control</span>
          <span id="alarmIndicator" class="status-pill ok">Sin alarmas</span>
        </div>
      </div>

      <div class="monitor-wrap">
        <canvas id="monitor" width="1100" height="620"></canvas>
      </div>

      <p class="monitor-hint">Doble clic sobre el monitor para entrar o salir de pantalla completa.</p>
    </div>
  </div>

  <script src="js/state.js"></script>
  <script src="js/waves.js"></script>
  <script src="js/alarms.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/renderer.js"></script>
  <script src="js/controls.js"></script>
  <script src="js/sync.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
