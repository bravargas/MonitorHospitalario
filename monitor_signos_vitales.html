<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Emulador de Monitor de Signos Vitales</title>
  <style>
    :root {
      --bg: #0a0d12;
      --panel: #000000;
      --card: #11151c;
      --border: #1d2633;
      --text: #eef2f7;
      --muted: #94a3b8;
      --green: #00ff33;
      --yellow: #ffee00;
      --cyan: #00e5ff;
      --magenta: #ff63ff;
      --orange: #ff4d00;
      --blue: #1437a8;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, #0b0f15, #07090d);
      color: var(--text);
    }

    .page {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px;
      display: grid;
      grid-template-columns: minmax(700px, 1.6fr) minmax(320px, 0.9fr);
      gap: 20px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: 0 16px 50px rgba(0, 0, 0, 0.35);
      overflow: hidden;
    }

    .card-header {
      padding: 18px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .title {
      font-size: 28px;
      font-weight: 700;
      margin: 0;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      border: 1px solid #2a3444;
      background: #161c25;
      color: white;
      padding: 10px 14px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 14px;
    }

    button:hover { background: #1c2430; }
    button.active { background: #253043; }

    .monitor-wrap {
      padding: 14px;
      background: #090b0f;
    }

    canvas {
      display: block;
      width: 100%;
      height: auto;
      background: #000;
      border-radius: 18px;
      border: 1px solid #162033;
    }

    .side {
      padding: 18px;
      display: grid;
      gap: 16px;
      align-content: start;
    }

    .section-title {
      font-size: 18px;
      font-weight: 700;
      margin: 0;
    }

    .toggle-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .toggle {
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(0,0,0,0.18);
    }

    .control {
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 12px;
      background: rgba(0,0,0,0.18);
    }

    .control-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }

    .control label {
      font-size: 14px;
      font-weight: 600;
    }

    .control .value-box {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .control input[type="number"],
    .control select {
      width: 100px;
      padding: 7px 8px;
      border-radius: 10px;
      border: 1px solid #344055;
      background: #0b1017;
      color: white;
      text-align: right;
    }

    .control select {
      width: 150px;
      text-align: left;
    }

    .control input[type="range"] {
      width: 100%;
    }

    .unit {
      color: var(--muted);
      font-size: 12px;
      width: 42px;
    }

    .quick {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .metric-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .metric {
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px;
      background: rgba(0,0,0,0.22);
    }

    .metric .name {
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .metric .num {
      font-family: Consolas, Monaco, monospace;
      font-weight: 700;
      font-size: 42px;
      line-height: 1;
    }

    .metric .small { font-size: 24px; }
    .green { color: var(--green); }
    .yellow { color: var(--yellow); }
    .cyan { color: var(--cyan); }
    .orange { color: var(--orange); }
    .magenta { color: var(--magenta); }

    .note {
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px;
      color: #cbd5e1;
      background: rgba(0,0,0,0.22);
      font-size: 14px;
      line-height: 1.45;
    }

    @media (max-width: 1100px) {
      .page { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="card">
      <div class="card-header">
        <h1 class="title">Emulador de monitor de signos vitales</h1>
        <div class="actions">
          <button id="btnStart" class="active">Pausar</button>
          <button id="btnReset">Reset</button>
          <button id="btnFullscreen">Pantalla completa</button>
        </div>
      </div>
      <div class="monitor-wrap">
        <canvas id="monitor" width="1100" height="620"></canvas>
      </div>
    </div>

    <div class="card">
      <div class="side">
        <h2 class="section-title">Controles del paciente</h2>

        <div class="toggle-row">
          <div class="toggle">
            <span>Grid</span>
            <input id="showGrid" type="checkbox" checked />
          </div>
          <div class="toggle">
            <span>Diagnóstico</span>
            <input id="showDiagnostic" type="checkbox" checked />
          </div>
        </div>

        <div class="toggle-row">
          <div class="toggle">
            <span>Alarmas</span>
            <input id="alarmsEnabled" type="checkbox" checked />
          </div>
          <div class="toggle">
            <span>Sonido</span>
            <input id="soundEnabled" type="checkbox" checked />
          </div>
        </div>

        <div class="control">
          <div class="control-top">
            <label for="alarmVolume">Volumen de alarma</label>
            <div class="value-box">
              <input id="alarmVolumeNumber" type="number" min="0" max="100" step="1" value="50" />
              <span class="unit">%</span>
            </div>
          </div>
          <input id="alarmVolume" type="range" min="0" max="100" step="1" value="50" />
        </div>

        <div class="control">
          <div class="control-top">
            <label for="channel2Type">Canal 2</label>
            <div class="value-box">
              <select id="channel2Type">
                <option value="cvp">CVP</option>
                <option value="art2">ART2</option>
                <option value="pap">PAP</option>
                <option value="icp">ICP</option>
                <option value="off">Desconectado</option>
              </select>
            </div>
          </div>
        </div>

        <div class="quick">
          <button data-profile="normal">Perfil normal</button>
          <button data-profile="tachy">Taquicardia</button>
          <button data-profile="brady">Bradicardia</button>
          <button data-profile="hypoxia">Hipoxia</button>
          <button data-profile="shock">Shock</button>
          <button data-profile="sedation">Sedación</button>
        </div>

        <div id="controls"></div>

        <div id="alarmBanner" class="note" style="display:none; border-color:#7f1d1d; background:rgba(127,29,29,0.22); color:#fecaca;">
          <strong>Alarma activa:</strong> <span id="alarmText">Sin alarmas</span>
        </div>

        <div class="metric-grid">
          <div class="metric">
            <div class="name green">HR</div>
            <div class="num green" id="mHr">80</div>
          </div>
          <div class="metric">
            <div class="name cyan">SpO2</div>
            <div class="num cyan" id="mSpO2">99</div>
          </div>
          <div class="metric">
            <div class="name yellow">RESP</div>
            <div class="num yellow small" id="mResp">14</div>
          </div>
          <div class="metric">
            <div class="name orange">PA</div>
            <div class="num orange small" id="mBP">120/80</div>
          </div>
        </div>

        <div class="note">
          El canal 2 ahora puede emular CVP, ART2, PAP, ICP o quedar desconectado.
        </div>
      </div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('monitor');
    const ctx = canvas.getContext('2d');

    const state = {
      alarmsEnabled: true,
      soundEnabled: true,
      alarmVolume: 0.5,
      activeAlarms: [],
      lastAlarmBeep: 0,
      audioUnlocked: false,
      running: true,
      showGrid: true,
      showDiagnostic: true,
      channel2Type: 'cvp',
      hr: 80,
      resp: 14,
      spo2: 99,
      co2: 38,
      sys: 120,
      dia: 80,
      temp: 37.0,
      cvp: 10,
      time: 0
    };

    const W = canvas.width;
    const H = canvas.height;
    const PANEL_W = 300;
    const GRID_W = W - PANEL_W;
    const ROWS = 6;
    const ROW_H = H / ROWS;

    const controlsConfig = [
      { key: 'hr', label: 'Frecuencia cardíaca', min: 20, max: 220, step: 1, unit: 'bpm' },
      { key: 'resp', label: 'Frecuencia respiratoria', min: 4, max: 45, step: 1, unit: 'rpm' },
      { key: 'spo2', label: 'SpO2', min: 50, max: 100, step: 1, unit: '%' },
      { key: 'co2', label: 'ETCO2', min: 0, max: 80, step: 1, unit: 'mmHg' },
      { key: 'sys', label: 'Presión sistólica', min: 50, max: 240, step: 1, unit: 'mmHg' },
      { key: 'dia', label: 'Presión diastólica', min: 20, max: 140, step: 1, unit: 'mmHg' },
      { key: 'cvp', label: 'Valor canal 2', min: 0, max: 30, step: 1, unit: 'mmHg' },
      { key: 'temp', label: 'Temperatura', min: 30, max: 42, step: 0.1, unit: '°C' }
    ];

    function clamp(v, min, max) {
      return Math.max(min, Math.min(max, v));
    }

    function mapValue() {
      return Math.round((state.sys + 2 * state.dia) / 3);
    }

    function getChannel2Display() {
      if (state.channel2Type === 'off') {
        return { label: 'CH2:Off', line1: '---/---', line2: '(---)', unit: '' };
      }
      if (state.channel2Type === 'cvp') {
        return { label: 'CH2:Cvp', line1: 'CVP', line2: `${state.cvp}`, unit: 'mmHg' };
      }
      if (state.channel2Type === 'art2') {
        const sys2 = clamp(state.sys - 6, 30, 260);
        const dia2 = clamp(state.dia - 4, 10, 180);
        const map2 = Math.round((sys2 + 2 * dia2) / 3);
        return { label: 'CH2:Art2', line1: `${sys2}/${dia2}`, line2: `(${map2})`, unit: 'mmHg' };
      }
      if (state.channel2Type === 'pap') {
        const sysP = clamp(Math.round(state.sys * 0.28), 10, 80);
        const diaP = clamp(Math.round(state.dia * 0.22), 4, 40);
        const meanP = Math.round((sysP + 2 * diaP) / 3);
        return { label: 'CH2:PAP', line1: `${sysP}/${diaP}`, line2: `(${meanP})`, unit: 'mmHg' };
      }
      if (state.channel2Type === 'icp') {
        return { label: 'CH2:ICP', line1: 'ICP', line2: `${clamp(Math.round(state.cvp + 2), 0, 40)}`, unit: 'mmHg' };
      }
      return { label: 'CH2:Cvp', line1: 'CVP', line2: `${state.cvp}`, unit: 'mmHg' };
    }

    function createControls() {
      const root = document.getElementById('controls');
      root.innerHTML = '';
      controlsConfig.forEach(cfg => {
        const wrap = document.createElement('div');
        wrap.className = 'control';
        wrap.innerHTML = `
          <div class="control-top">
            <label for="num-${cfg.key}">${cfg.label}</label>
            <div class="value-box">
              <input id="num-${cfg.key}" type="number" min="${cfg.min}" max="${cfg.max}" step="${cfg.step}" value="${state[cfg.key]}" />
              <span class="unit">${cfg.unit}</span>
            </div>
          </div>
          <input id="range-${cfg.key}" type="range" min="${cfg.min}" max="${cfg.max}" step="${cfg.step}" value="${state[cfg.key]}" />
        `;
        root.appendChild(wrap);

        const n = wrap.querySelector(`#num-${cfg.key}`);
        const r = wrap.querySelector(`#range-${cfg.key}`);

        function sync(v) {
          const parsed = clamp(Number(v), cfg.min, cfg.max);
          state[cfg.key] = parsed;
          n.value = parsed;
          r.value = parsed;
          updateMetrics();
        }

        n.addEventListener('input', e => sync(e.target.value));
        r.addEventListener('input', e => sync(e.target.value));
      });
    }

    function updateMetrics() {
      document.getElementById('mHr').textContent = state.hr;
      document.getElementById('mSpO2').textContent = state.spo2;
      document.getElementById('mResp').textContent = state.resp;
      document.getElementById('mBP').textContent = `${state.sys}/${state.dia}`;
      evaluateAlarms();
    }

    function evaluateAlarms() {
      if (!state.alarmsEnabled) {
        state.activeAlarms = [];
        updateAlarmBanner();
        return;
      }

      const alarms = [];
      if (state.spo2 < 90) alarms.push(`SpO2 baja (${state.spo2}%)`);
      if (state.hr > 130) alarms.push(`Taquicardia (${state.hr} bpm)`);
      if (state.hr < 45) alarms.push(`Bradicardia (${state.hr} bpm)`);
      if (state.resp > 28) alarms.push(`Taquipnea (${state.resp} rpm)`);
      if (state.resp < 8) alarms.push(`Bradipnea (${state.resp} rpm)`);
      if (state.sys < 90) alarms.push(`Hipotensión (${state.sys}/${state.dia})`);
      if (state.co2 > 50) alarms.push(`ETCO2 alto (${state.co2} mmHg)`);
      if (state.co2 < 25 && state.resp > 20) alarms.push(`ETCO2 bajo (${state.co2} mmHg)`);
      if (state.temp >= 39) alarms.push(`Temperatura alta (${state.temp.toFixed(1)} °C)`);
      if (state.channel2Type === 'cvp' && state.cvp > 15) alarms.push(`CVP alta (${state.cvp} mmHg)`);
      if (state.channel2Type === 'icp' && state.cvp + 2 > 20) alarms.push(`ICP alta (${clamp(Math.round(state.cvp + 2), 0, 40)} mmHg)`);

      state.activeAlarms = alarms;
      updateAlarmBanner();
    }

    function updateAlarmBanner() {
      const banner = document.getElementById('alarmBanner');
      const text = document.getElementById('alarmText');
      if (state.activeAlarms.length === 0) {
        banner.style.display = 'none';
        text.textContent = 'Sin alarmas';
      } else {
        banner.style.display = 'block';
        text.textContent = state.activeAlarms.join(' | ');
      }
    }

    let audioCtx = null;
    function unlockAudio() {
      if (!state.soundEnabled) return;
      if (!audioCtx) {
        const AC = window.AudioContext || window.webkitAudioContext;
        if (AC) audioCtx = new AC();
      }
      if (audioCtx && audioCtx.state === 'suspended') {
        audioCtx.resume().catch(() => {});
      }
      state.audioUnlocked = !!audioCtx;
    }

    function beep(freq = 880, duration = 0.12) {
      if (!state.soundEnabled || !state.alarmsEnabled || state.activeAlarms.length === 0) return;
      unlockAudio();
      if (!audioCtx) return;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'square';
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0.0001, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(Math.max(0.0001, state.alarmVolume * 0.06), audioCtx.currentTime + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + duration + 0.01);
    }

    function applyProfile(name) {
      const profiles = {
        normal:   { hr: 80, resp: 14, spo2: 99, co2: 38, sys: 120, dia: 80, temp: 37.0, cvp: 10 },
        tachy:    { hr: 135, resp: 24, spo2: 97, co2: 35, sys: 110, dia: 70, temp: 37.4, cvp: 8 },
        brady:    { hr: 42, resp: 10, spo2: 98, co2: 40, sys: 100, dia: 60, temp: 36.5, cvp: 9 },
        hypoxia:  { hr: 118, resp: 30, spo2: 82, co2: 32, sys: 126, dia: 76, temp: 37.2, cvp: 10 },
        shock:    { hr: 145, resp: 32, spo2: 89, co2: 28, sys: 78, dia: 48, temp: 36.1, cvp: 4 },
        sedation: { hr: 58, resp: 8, spo2: 95, co2: 47, sys: 108, dia: 68, temp: 36.7, cvp: 11 }
      };
      Object.assign(state, profiles[name]);
      createControls();
      updateMetrics();
    }

    document.querySelectorAll('[data-profile]').forEach(btn => {
      btn.addEventListener('click', () => applyProfile(btn.dataset.profile));
    });

    document.getElementById('showGrid').addEventListener('change', e => state.showGrid = e.target.checked);
    document.getElementById('showDiagnostic').addEventListener('change', e => state.showDiagnostic = e.target.checked);
    document.getElementById('alarmsEnabled').addEventListener('change', e => {
      state.alarmsEnabled = e.target.checked;
      evaluateAlarms();
    });
    document.getElementById('soundEnabled').addEventListener('change', e => {
      state.soundEnabled = e.target.checked;
      unlockAudio();
    });
    document.getElementById('channel2Type').addEventListener('change', e => {
      state.channel2Type = e.target.value;
      evaluateAlarms();
    });

    function syncAlarmVolume(v) {
      const value = clamp(Number(v), 0, 100);
      state.alarmVolume = value / 100;
      document.getElementById('alarmVolume').value = value;
      document.getElementById('alarmVolumeNumber').value = value;
      unlockAudio();
    }

    document.getElementById('alarmVolume').addEventListener('input', e => syncAlarmVolume(e.target.value));
    document.getElementById('alarmVolumeNumber').addEventListener('input', e => syncAlarmVolume(e.target.value));

    document.getElementById('btnStart').addEventListener('click', () => {
      state.running = !state.running;
      document.getElementById('btnStart').textContent = state.running ? 'Pausar' : 'Iniciar';
      document.getElementById('btnStart').classList.toggle('active', state.running);
    });

    document.getElementById('btnReset').addEventListener('click', () => applyProfile('normal'));

    document.getElementById('btnFullscreen').addEventListener('click', async () => {
      const el = document.documentElement;
      if (!document.fullscreenElement) {
        await el.requestFullscreen?.();
      } else {
        await document.exitFullscreen?.();
      }
    });

    function wave(type, x, t) {
      const phase = x * Math.PI * 2 + t;

      if (type === 'ecg') {
        const beat = (phase * state.hr) / 80;
        const mod = beat % (2 * Math.PI);
        const p = Math.exp(-Math.pow(mod - 0.7, 2) / 0.008) * 0.12;
        const q = -Math.exp(-Math.pow(mod - 1.18, 2) / 0.0018) * 0.2;
        const r = Math.exp(-Math.pow(mod - 1.24, 2) / 0.0009) * 0.9;
        const s = -Math.exp(-Math.pow(mod - 1.31, 2) / 0.0016) * 0.25;
        const tw = Math.exp(-Math.pow(mod - 1.8, 2) / 0.02) * 0.22;
        return p + q + r + s + tw;
      }

      if (type === 'resp') {
        return Math.sin((phase * state.resp) / 16) * 0.75;
      }

      if (type === 'pleth') {
        const p = (phase * state.hr) / 80;
        const main = Math.pow(Math.max(0, Math.sin(p)), 2.2);
        const notch = Math.pow(Math.max(0, Math.sin(p - 0.45)), 5) * 0.28;
        return main * 0.95 + notch;
      }

      if (type === 'co2') {
        const p = (phase * state.resp) / 16;
        const s = Math.sin(p);
        if (s < -0.2) return -0.55;
        if (s < 0.15) return -0.1 + s * 0.25;
        return 0.5 - Math.exp(-(s + 0.2) * 2.8) * 0.25;
      }

      if (type === 'art') {
        const p = (phase * state.hr) / 80;
        const main = Math.pow(Math.max(0, Math.sin(p)), 2.1) * 0.82;
        const rebound = Math.pow(Math.max(0, Math.sin(p - 0.3)), 4) * 0.16;
        return main + rebound - 0.15;
      }

      if (type === 'cvp') {
        const p = (phase * state.hr) / 80;
        const a = Math.pow(Math.max(0, Math.sin(p)), 3) * 0.12;
        const c = Math.pow(Math.max(0, Math.sin(p - 0.5)), 3) * 0.08;
        const v = Math.pow(Math.max(0, Math.sin(p - 1.2)), 3) * 0.1;
        return a + c + v - 0.1;
      }

      if (type === 'pap') {
        const p = (phase * state.hr) / 80;
        const main = Math.pow(Math.max(0, Math.sin(p)), 1.8) * 0.5;
        const notch = Math.pow(Math.max(0, Math.sin(p - 0.22)), 4) * 0.08;
        return main + notch - 0.12;
      }

      if (type === 'icp') {
        const p = (phase * state.hr) / 80;
        return Math.pow(Math.max(0, Math.sin(p)), 2.2) * 0.16 - 0.08;
      }

      if (type === 'flat') {
        return -0.02;
      }

      return 0;
    }

    function drawGrid() {
      ctx.save();
      ctx.strokeStyle = 'rgba(14,165,233,0.18)';
      ctx.lineWidth = 1;
      for (let i = 0; i <= 18; i++) {
        const x = (GRID_W / 18) * i;
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, H);
        ctx.stroke();
      }
      for (let i = 0; i <= 24; i++) {
        const y = (H / 24) * i;
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(GRID_W, y);
        ctx.stroke();
      }
      ctx.restore();
    }

    function drawTrace(type, color, yBase, amplitude, noise = 0) {
      ctx.save();
      ctx.strokeStyle = color;
      ctx.lineWidth = 2;
      ctx.beginPath();
      const samples = 280;
      for (let i = 0; i < samples; i++) {
        const xn = i / (samples - 1);
        const x = xn * GRID_W;
        let y = wave(type, xn * 6, state.time);
        if (noise) y += (Math.random() - 0.5) * noise;
        const py = yBase - y * amplitude;
        if (i === 0) ctx.moveTo(x, py);
        else ctx.lineTo(x, py);
      }
      ctx.stroke();
      ctx.restore();
    }

    function drawText(text, x, y, color, size = 18, align = 'left') {
      ctx.save();
      ctx.fillStyle = color;
      ctx.font = `700 ${size}px Consolas, Monaco, monospace`;
      ctx.textAlign = align;
      ctx.fillText(text, x, y);
      ctx.restore();
    }

    function drawPanel() {
      const ch2 = getChannel2Display();
      ctx.fillStyle = '#05070b';
      ctx.fillRect(GRID_W, 0, PANEL_W, H);
      ctx.strokeStyle = '#1437a8';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(GRID_W, 0);
      ctx.lineTo(GRID_W, H);
      ctx.stroke();

      ctx.lineWidth = 1;
      [110, 180, 270, 360, 490].forEach(y => {
        ctx.beginPath();
        ctx.moveTo(GRID_W, y);
        ctx.lineTo(W, y);
        ctx.stroke();
      });
      ctx.beginPath();
      ctx.moveTo(GRID_W + PANEL_W / 2, 110);
      ctx.lineTo(GRID_W + PANEL_W / 2, 180);
      ctx.stroke();

      drawText('ECG', GRID_W + 14, 28, '#6eff6e', 18);
      drawText('bpm', GRID_W + 14, 46, '#6eff6e', 18);
      drawText(String(state.hr), GRID_W + 230, 88, '#00ff33', 96, 'right');

      drawText('RESP', GRID_W + 14, 134, '#ffee00', 18);
      drawText(String(state.resp), GRID_W + 90, 170, '#ffee00', 56);

      drawText('TEMP', GRID_W + 166, 134, '#ffb000', 18);
      drawText('T1', GRID_W + 166, 152, '#ffb000', 14);
      drawText('T2', GRID_W + 166, 168, '#ffb000', 14);
      drawText('TD', GRID_W + 166, 184, '#ffb000', 14);

      drawText('SpO2', GRID_W + 14, 206, '#00e5ff', 18);
      drawText(String(state.spo2), GRID_W + 90, 248, '#00e5ff', 56);
      drawText('%', GRID_W + 258, 206, '#00e5ff', 18);
      for (let i = 0; i < 6; i++) {
        ctx.fillStyle = i < Math.max(1, Math.round(state.spo2 / 17)) ? '#00e5ff' : 'rgba(0,229,255,0.25)';
        ctx.fillRect(GRID_W + 250, 252 - i * 8, 16, 5);
      }

      drawText('CO2', GRID_W + 14, 296, '#ff63ff', 18);
      drawText(String(state.co2), GRID_W + 92, 338, '#ff63ff', 56);
      drawText('mmHg', GRID_W + 212, 296, '#ff63ff', 18);

      drawText('IBP (1,2)', GRID_W + 14, 386, '#ff4d00', 18);
      drawText(`${state.sys}/${state.dia}`, GRID_W + 14, 432, '#ff4d00', 30);
      drawText(`(${mapValue()})`, GRID_W + 210, 432, '#ff4d00', 28, 'right');
      drawText('mmHg', GRID_W + 212, 386, '#ff4d00', 18);
      drawText(ch2.line1, GRID_W + 14, 470, '#ff4d00', 30);
      drawText(ch2.line2, GRID_W + 210, 470, '#ff4d00', 28, 'right');
      if (ch2.unit) drawText(ch2.unit, GRID_W + 212, 448, '#ff4d00', 18);

      drawText('NIBP', GRID_W + 14, 520, '#f5f5f5', 18);
      drawText('mmHg', GRID_W + 212, 520, '#bdbdbd', 18);
      drawText(`${state.sys}/${state.dia}`, GRID_W + 14, 566, '#f5f5f5', 30);
      drawText(`(${mapValue()})`, GRID_W + 210, 566, '#f5f5f5', 28, 'right');
      drawText('Manual', GRID_W + 14, 595, '#d0d7e2', 18);
    }

    function drawLabels() {
      const ch2 = getChannel2Display();
      drawText('II   XI', 14, 24, '#00ff33', 18);
      if (state.showDiagnostic) drawText('Diagnostic', 150, 24, '#7cff7c', 18);
      drawText('RESP', 14, ROW_H + 24, '#ffee00', 18);
      drawText('Pleth', 14, ROW_H * 2 + 24, '#00e5ff', 18);
      drawText('CO2', 14, ROW_H * 3 + 24, '#ff63ff', 18);
      drawText('CH1:Art', 14, ROW_H * 4 + 24, '#ff4d00', 18);
      drawText(ch2.label, 14, ROW_H * 5 + 24, '#ff4d00', 18);
    }

    function render() {
      ctx.clearRect(0, 0, W, H);
      ctx.fillStyle = state.activeAlarms.length ? '#120000' : '#000';
      ctx.fillRect(0, 0, W, H);

      if (state.showGrid) drawGrid();
      drawLabels();

      drawTrace('ecg', '#00ff33', ROW_H * 0.58, 38, 0);
      drawTrace('resp', '#ffee00', ROW_H * 1.58, 28, 0);
      drawTrace('pleth', '#00e5ff', ROW_H * 2.58, 46, 0.01);
      drawTrace('co2', '#ff63ff', ROW_H * 3.58, 30, 0.004);
      drawTrace('art', '#ff4d00', ROW_H * 4.58, 26, 0.006);

      const channel2Wave = state.channel2Type === 'off'
        ? 'flat'
        : state.channel2Type === 'pap'
          ? 'pap'
          : state.channel2Type === 'icp'
            ? 'icp'
            : state.channel2Type === 'art2'
              ? 'art'
              : 'cvp';

      const channel2Amp = state.channel2Type === 'pap'
        ? 22
        : state.channel2Type === 'art2'
          ? 26
          : state.channel2Type === 'icp'
            ? 14
            : state.channel2Type === 'off'
              ? 3
              : 16;

      drawTrace(channel2Wave, '#ff4d00', ROW_H * 5.58, channel2Amp, 0.01);
      drawPanel();

      if (state.activeAlarms.length) {
        ctx.save();
        ctx.strokeStyle = 'rgba(255,60,60,0.85)';
        ctx.lineWidth = 4;
        ctx.strokeRect(2, 2, W - 4, H - 4);
        ctx.restore();
      }
    }

    let last = performance.now();
    function animate(now) {
      const dt = (now - last) / 1000;
      last = now;
      if (state.running) state.time += dt * 2.3;

      if (state.activeAlarms.length && state.alarmsEnabled) {
        const critical = state.activeAlarms.some(a => a.includes('SpO2 baja') || a.includes('Hipotensión'));
        const interval = critical ? 700 : 1200;
        if (now - state.lastAlarmBeep >= interval) {
          beep(critical ? 740 : 880);
          state.lastAlarmBeep = now;
        }
      }

      render();
      requestAnimationFrame(animate);
    }

    ['click', 'keydown', 'touchstart'].forEach(evt => {
      window.addEventListener(evt, unlockAudio, { once: true });
    });

    createControls();
    document.getElementById('channel2Type').value = state.channel2Type;
    updateMetrics();
    requestAnimationFrame(animate);
  </script>
</body>
</html>
